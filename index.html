<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tasmania Hike Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --text:#ebf5f1;
  --muted:#9bb6ad;
}

body{
  margin:0;
  font-family:system-ui;
  background:#07131d;
  color:var(--text);
}

#tabs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:12px;
}

.tab{
  padding:10px 14px;
  border-radius:20px;
  background:#102531;
  border:1px solid #2a3d47;
  cursor:pointer;
}

.tab.active{
  background:#2f6f66;
}

#map{
  height:520px;
}

.photo-popup{
  width:220px;
}

.photo-popup img{
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.lightbox.show{
  display:flex;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div id="tabs"></div>
<div id="map"></div>

<div id="lightbox" class="lightbox">
  <img id="lightboxImage">
</div>

<script>

const state={
  hikes:[],
  photos:[],
  map:null,
  routeLayer:null,
  photoLayer:null,
  activeIndex:0
}

function prettyName(f){
  return f.replace(".gpx","").replaceAll("_"," ")
}

async function loadManifest(){
  return await (await fetch("./data/files.json")).json()
}

async function loadPhotos(){
  try{
    return await (await fetch("./data/photos.json")).json()
  }catch{return[]}
}

async function loadGpx(file){
  const txt=await (await fetch("./data/"+file)).text()
  const xml=new DOMParser().parseFromString(txt,"text/xml")

  const pts=[...xml.getElementsByTagName("trkpt")].map(p=>({
    lat:parseFloat(p.getAttribute("lat")),
    lon:parseFloat(p.getAttribute("lon"))
  }))

  return {file,title:prettyName(file),points:pts}
}

function renderTabs(){
  const el=document.getElementById("tabs")
  el.innerHTML=""
  state.hikes.forEach((h,i)=>{
    const b=document.createElement("div")
    b.className="tab"+(i===state.activeIndex?" active":"")
    b.innerText=h.title
    b.onclick=()=>activate(i)
    el.appendChild(b)
  })
}

function ensureMap(){
  if(state.map)return
  state.map=L.map("map")
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(state.map)
}

function drawMap(h){
  ensureMap()

  if(state.routeLayer)state.map.removeLayer(state.routeLayer)

  const line=L.polyline(h.points.map(p=>[p.lat,p.lon]),{
    color:"#4da3ff",
    weight:5
  })

  state.routeLayer=line.addTo(state.map)
  state.map.fitBounds(line.getBounds())
}

function openLightbox(url){
  const box=document.getElementById("lightbox")
  const img=document.getElementById("lightboxImage")
  img.src=url
  box.classList.add("show")
}

document.getElementById("lightbox").onclick=()=>{
  document.getElementById("lightbox").classList.remove("show")
}

function drawPhotoMarkers(h){
  if(state.photoLayer)state.map.removeLayer(state.photoLayer)

  const photos=state.photos.filter(p=>p.assigned_gpx===h.file)

  const markers=photos.map(photo=>{
    const marker=L.circleMarker([photo.lat,photo.lon],{
      radius:6,
      color:"#000",
      fillColor:"#ffd166",
      fillOpacity:1
    })

    const html=`
      <div class="photo-popup">
        <strong>${photo.caption}</strong>
        <img src="${photo.url}" data-img>
      </div>
    `

    marker.bindPopup(html,{maxWidth:260,minWidth:220})

    marker.on("popupopen",()=>{
      const popup=marker.getPopup()
      const el=popup.getElement()
      const img=el.querySelector("[data-img]")

      if(!img)return

      if(img.complete){
        popup.update()
      }else{
        img.addEventListener("load",()=>popup.update(),{once:true})
      }

      img.onclick=()=>openLightbox(photo.url)
    })

    return marker
  })

  state.photoLayer=L.featureGroup(markers).addTo(state.map)
}

function activate(i){
  state.activeIndex=i
  renderTabs()
  const h=state.hikes[i]
  drawMap(h)
  drawPhotoMarkers(h)
}

async function boot(){
  const files=await loadManifest()
  state.hikes=await Promise.all(files.map(loadGpx))
  state.photos=await loadPhotos()

  renderTabs()
  activate(0)
}

boot()

</script>
</body>
</html>
